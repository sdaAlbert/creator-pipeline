services:
  mysql:
    image: docker.m.daocloud.io/library/mysql:8.4
    environment:
      MYSQL_DATABASE: creator_pipeline
      MYSQL_USER: creator
      MYSQL_PASSWORD: creator
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "35672:5672"
      - "15672:15672"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
